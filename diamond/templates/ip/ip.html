{% extends 'baseaut.html' %}
{% load static %}

{% block estilos %}
<link rel="stylesheet" href="{% static 'css/ip.css' %}">
{% endblock %}

{% block contenido %}
<main class="formulario">
    <section class="diseño">
        <a href="{% url 'cliente' %}" class="btn-volver-flecha">↩</a>
        <h2>Registro de Dispositivo</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="campo">
                <label for="puerta">Nombre de la puerta</label>
                <input 
                    type="text" 
                    name="puerta" 
                    id="puerta" 
                    placeholder="Ej: Puerta Principal" 
                    required>
            </div>

            <div class="campo">
                <label for="ip">Dirección IP</label>
                <input 
                    type="text" 
                    name="ip" 
                    id="ip" 
                    placeholder="Ej: 192.168.0.10" 
                    pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$"
                    required>
            </div>

            <div class="campo">
                <label for="estado">Estado</label>
                <select name="estado" id="estado" required>
                    <option value="activa">Activa</option>
                    <option value="inactiva">Inactiva</option>
                </select>
            </div>

            <button type="submit" class="btn-guardar">Guardar</button>
        </form>
    </section>
</main>
{% endblock %}
