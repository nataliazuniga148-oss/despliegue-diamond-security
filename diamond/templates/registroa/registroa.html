{% extends 'baseaut.html' %}
{% load static %}
{% block estilos %}
<link rel="stylesheet" href="{% static 'css/registroa.css' %}">
{% endblock %}
{% block titulo %}{% endblock %}
{% block contenido %}

<div class="panel-registro">
    <main class="fondo">
        <section class="contenedor-formulario">

            <h2><em>INGRESE LOS SIGUIENTES DATOS</em></h2>

            {% if error %}
            <div style="color: red; font-weight: bold; margin-bottom: 10px;">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="fila">
                    <div class="campo">
                        <label for="tipo_usuario">Tipo de usuario:</label>
                        <select name="tipo_usuario" id="tipo_usuario" required>
                            <option value="" disabled selected>Seleccione</option>
                            <option value="residente">Residente</option>
                            <option value="visitante">Visitante</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="nombre">Nombre completo:</label>
                        <input type="text" name="nombre" id="nombre" placeholder="Tu nombre completo" required>
                    </div>
                </div>

                <div class="fila">
                    <div class="campo">
                        <label for="tipo_documento">Tipo de documento:</label>
                        <select name="tipo_documento" id="tipo_documento" required>
                            <option value="" disabled selected>Seleccione</option>
                            <option value="cc">Cédula de ciudadanía</option>
                            <option value="ce">Cédula de extranjería</option>
                            <option value="pasaporte">Pasaporte</option>
                            <option value="ti">Tarjeta de identidad</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="documento">Número de documento:</label>
                        <input type="text" name="documento" id="documento" placeholder="Documento" required>
                    </div>
                </div>

                <div class="fila">
                    <div class="campo">
                        <label for="telefono">Número de teléfono:</label>
                        <input type="text" name="telefono" id="telefono" placeholder="Número de teléfono" required>
                    </div>

                    <div class="campo">
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" placeholder="Correo electrónico" required>
                    </div>
                </div>

                <div class="fila">
                    <div class="campo">
                        <label for="torre">Torre y apartamento:</label>
                        <input type="text" name="torre" id="torre" placeholder="Torre y apartamento" required>
                    </div>

                    <div class="campo">
                        <label for="parqueadero">Número de parqueadero:</label>
                        <input type="text" name="parqueadero" id="parqueadero" placeholder="Parqueadero">
                    </div>
                </div>

                <div class="fila">
                    <div class="campo">
                        <label for="placa">Vehículo:</label>
                        <input type="text" name="placa" id="placa" placeholder="Descripción del vehículo">
                    </div>

                    <div class="campo">
                        <label for="fecha">Fecha:</label>
                        <input type="date" name="fecha" id="fecha" required>
                    </div>
                </div>

                <div class="fila">
                    <div class="campo">
                        <label for="hora_ingreso">Hora de registro:</label>
                        <input type="time" name="hora_ingreso" id="hora_ingreso" required>
                    </div>

                    <div class="campo">
                        <label for="observaciones">Observaciones</label>
                        <input type="text" name="observaciones" id="observaciones" placeholder="Digite la observación correspondiente">
                    </div>
                </div>

                <div class="fila centrar">
                    <button type="submit" class="btn-registrar">Registrar</button>
                    <a href="{% url 'verusuario' %}" class="btn-ver">Ver registros</a>
                </div>

            </form>

        </section>
    </main>
</div>

{% endblock %}
