{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Cambiar foto de perfil</title>

<style>

body {
    font-family: Arial, sans-serif;

    background-image: url('https://media.tiffany.com/is/image/tiffanydm/2022_LE-GuidetoDiamonds-LP-TILE-1-Desktop?$tile$&wid=2992');
    background-size: cover;        
    background-position: center;   
    background-repeat: no-repeat;  
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


/* CARD */
.card {
    background: white;
    width: 420px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

/* TITULO */
h2 {
    color: #0d47a1;
    margin-bottom: 20px;
}

/* INFO FOTO */
.info {
    font-size: 14px;
    color: #555;
    margin-bottom: 15px;
}

/* INPUT FILE */
input[type="file"] {
    display: block;
    margin: 10px auto;
    padding: 10px;
    border: 2px dashed #5f7d95;
    background: #f7fafc;
    border-radius: 10px;
    cursor: pointer;
}

/* BOTÓN AZUL */
.btn-guardar {
    margin-top: 15px;
    width: 160px;
    height: 42px;
    border-radius: 10px;

    background: #c5d3e0;
    border: 2px solid #5f7d95;
    color: #1f2d3a;

    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn-guardar:hover {
    background: #5f7d95;
    color: white;
}

/* LINK */
a {
    display: inline-block;
    margin-top: 15px;
    color: #1565c0;
    text-decoration: none;
    font-weight: bold;
}

a:hover {
    color: #0d47a1;
}

</style>

</head>

<body>

<div class="card">

    <h2>Cambiar foto de perfil</h2>

    <p class="info">
        Foto actual:
        <strong>{{ perfil.foto }}</strong>
    </p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.foto }}

        <button type="submit" class="btn-guardar">
            Guardar foto
        </button>
    </form>

    <a href="{% url 'cliente' %}">Volver</a>

</div>

</body>
</html>
